<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>جدار التضامن 2026 - مليون بكسل تفاعلي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: linear-gradient(135deg, #0a2e0a 0%, #1a1a2e 100%); min-height: 100vh; font-family: 'Tajawal', 'Cairo', sans-serif; color: #fff; overflow: hidden; }
        
        /* واجهة التحكم */
        .controls { position: fixed; top: 10px; left: 10px; right: 10px; z-index: 2000; display: flex; flex-wrap: wrap; gap: 8px; justify-content: space-between; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 30px; backdrop-filter: blur(5px); }
        .lang-switch { background: #e74c3c; border: none; padding: 5px 12px; border-radius: 20px; color: #fff; cursor: pointer; font-weight: bold; }
        .stats { display: flex; gap: 15px; }
        .stat { font-size: 12px; }
        .stat span { color: #e74c3c; font-weight: bold; }
        
        /* لوحة الألوان - أفقية قابلة للتمرير */
        .color-palette { position: fixed; bottom: 10px; left: 10px; right: 10px; z-index: 2000; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 30px; display: flex; gap: 6px; overflow-x: auto; justify-content: center; backdrop-filter: blur(5px); }
        .color { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.5); flex-shrink: 0; transition: 0.1s; }
        .color.active { border-color: #e74c3c; box-shadow: 0 0 10px #e74c3c; transform: scale(1.05); }
        
        /* حاوية اللوحة (قابلة للتحريك والتكبير) */
        .canvas-container { width: 100vw; height: 100vh; overflow: auto; cursor: grab; background: #111; }
        .canvas-container:active { cursor: grabbing; }
        
        /* اللوحة العملاقة (Canvas) */
        #canvas { display: block; margin: 0; background: #2d2d2d; }
        
        /* مؤشر التحميل */
        .loading { position: fixed; bottom: 20px; right: 20px; background: #e74c3c; padding: 6px 12px; border-radius: 20px; font-size: 11px; display: none; z-index: 2100; }
        
        /* نافذة الشراء */
        .purchase-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { background: #1a2e1a; padding: 20px; border-radius: 20px; border: 2px solid #e74c3c; width: 90%; max-width: 350px; text-align: center; }
        .modal-content input { width: 100%; padding: 8px; margin: 8px 0; background: #0f1a0f; border: 1px solid #e74c3c; border-radius: 8px; color: #fff; }
        .modal-content button { background: #e74c3c; color: #fff; border: none; padding: 8px; border-radius: 8px; cursor: pointer; margin-top: 8px; width: 100%; }
        
        @media (max-width: 768px) { .color { width: 30px; height: 30px; } .controls { font-size: 10px; } }
    </style>
</head>
<body>

<div class="controls">
    <button class="lang-switch" id="lang-btn" onclick="toggleLanguage()">English</button>
    <div class="stats">
        <div class="stat">🎨 <span id="pixel-count">0</span> / 1,000,000</div>
        <div class="stat">💰 <span id="price">1</span>$</div>
    </div>
</div>

<div class="color-palette" id="color-palette"></div>

<div class="canvas-container" id="canvas-container">
    <canvas id="canvas"></canvas>
</div>

<div class="loading" id="loading">⏳ جاري المعالجة...</div>

<div id="purchase-modal" class="purchase-modal">
    <div class="modal-content">
        <div style="font-size: 40px;">🇵🇸</div>
        <h3 id="modal-title">اشتر هذا البكسل</h3>
        <p id="modal-desc">بعد الشراء، سيظهر لونك ورابطك للجميع</p>
        <input type="text" id="owner-name" placeholder="اسمك أو معرفك">
        <input type="url" id="owner-url" placeholder="رابط حسابك">
        <button id="confirm-purchase">✅ تأكيد الشراء (1$)</button>
        <button onclick="closeModal()" id="cancel-btn">❌ إلغاء</button>
    </div>
</div>

<script>
    // ===================== الإعدادات =====================
    const SERVER_URL = "https://thewallofsolidarity20261-production.up.railway.app";
    const SIZE = 1000;  // 1000 × 1000 = 1,000,000 بكسل
    let currentLang = 'ar';
    let currentColor = "#e74c3c";
    let soldPixels = new Map(); // key: "x,y" -> {color, owner, url}
    let ws = null;
    let selectedPixel = null;
    
    // الألوان (16 لوناً)
    const colorsList = [
        "#e74c3c", "#2c3e50", "#ecf0f1", "#2ecc71", "#f1c40f", "#3498db", "#e67e22", "#9b59b6",
        "#1abc9c", "#fd79a8", "#8B4513", "#34495e", "#ffeaa7", "#55efc4", "#74b9ff", "#b2bec3"
    ];
    
    // الترجمة
    const translations = {
        ar: { title: "اشتر هذا البكسل", desc: "بعد الشراء، سيظهر لونك ورابطك للجميع", confirm: "✅ تأكيد الشراء (1$)", cancel: "❌ إلغاء", langBtn: "English" },
        en: { title: "Buy This Pixel", desc: "Your color and link will appear to everyone", confirm: "✅ Confirm Purchase (1$)", cancel: "❌ Cancel", langBtn: "العربية" }
    };
    
    // ===================== إعدادات اللوحة (Canvas) =====================
    const canvas = document.getElementById('canvas');
    const container = document.getElementById('canvas-container');
    let ctx = canvas.getContext('2d');
    let scale = 4;  // حجم البكسل بالبكسل الفعلي (4×4)
    let offsetX = 0, offsetY = 0;
    
    function resizeCanvas() {
        canvas.width = SIZE * scale;
        canvas.height = SIZE * scale;
        canvas.style.width = `${SIZE * scale}px`;
        canvas.style.height = `${SIZE * scale}px`;
        drawAllPixels();
    }
    
    function drawAllPixels() {
        if (!ctx) return;
        for (let y = 0; y < SIZE; y++) {
            for (let x = 0; x < SIZE; x++) {
                const key = `${x},${y}`;
                if (soldPixels.has(key)) {
                    const data = soldPixels.get(key);
                    ctx.fillStyle = data.color;
                    ctx.fillRect(x * scale, y * scale, scale, scale);
                } else {
                    ctx.fillStyle = "#2d2d2d";
                    ctx.fillRect(x * scale, y * scale, scale, scale);
                }
            }
        }
    }
    
    function drawPixel(x, y, color) {
        if (!ctx) return;
        ctx.fillStyle = color;
        ctx.fillRect(x * scale, y * scale, scale, scale);
    }
    
    // تحويل إحداثيات النقرة إلى إحداثيات البكسل
    function getPixelFromClick(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const canvasX = (clientX - rect.left) * (canvas.width / rect.width);
        const canvasY = (clientY - rect.top) * (canvas.height / rect.height);
        const x = Math.floor(canvasX / scale);
        const y = Math.floor(canvasY / scale);
        return { x, y };
    }
    
    // ===================== WebSocket (تحديث فوري) =====================
    function connectWebSocket() {
        const wsUrl = SERVER_URL.replace("https://", "").replace("http://", "");
        ws = new WebSocket(`wss://${wsUrl}/ws`);
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === "new_pixel") {
                const key = `${data.x},${data.y}`;
                soldPixels.set(key, { color: data.color, owner: data.owner, url: data.url });
                drawPixel(data.x, data.y, data.color);
                document.getElementById('pixel-count').innerText = soldPixels.size;
            }
        };
        ws.onclose = () => setTimeout(connectWebSocket, 3000);
    }
    
    // ===================== جلب البيانات من السيرفر =====================
    async function fetchPixels() {
        try {
            const res = await fetch(`${SERVER_URL}/pixels`);
            const data = await res.json();
            soldPixels.clear();
            if (data.pixels) {
                data.pixels.forEach(p => {
                    soldPixels.set(`${p.x},${p.y}`, { color: p.color, owner: p.owner, url: p.url });
                });
            }
            document.getElementById('pixel-count').innerText = soldPixels.size;
            drawAllPixels();
        } catch(e) { console.error(e); }
    }
    
    // ===================== أحداث النقر على اللوحة =====================
    canvas.addEventListener('click', (e) => {
        const { x, y } = getPixelFromClick(e.clientX, e.clientY);
        if (x >= 0 && x < SIZE && y >= 0 && y < SIZE) {
            const key = `${x},${y}`;
            if (soldPixels.has(key)) {
                alert(translations[currentLang].soldAlert || "This pixel is already sold!");
                return;
            }
            selectedPixel = { x, y };
            document.getElementById('purchase-modal').style.display = 'flex';
        }
    });
    
    // ===================== إنشاء فاتورة ودفع =====================
    async function createInvoice(owner, url) {
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        try {
            const res = await fetch(`${SERVER_URL}/create-invoice`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    x: selectedPixel.x,
                    y: selectedPixel.y,
                    color: currentColor,
                    owner: owner,
                    url: url
                })
            });
            const data = await res.json();
            if (data.free) {
                loading.style.display = 'none';
                closeModal();
                alert('🎉 تهانينا! بكسل مجاني!');
                fetchPixels();
                return;
            }
            if (data.pay_url) {
                loading.style.display = 'none';
                closeModal();
                window.open(data.pay_url, '_blank');
                checkPaymentStatus(data.invoice_id);
            } else {
                loading.style.display = 'none';
                alert("Error creating invoice");
            }
        } catch(e) {
            loading.style.display = 'none';
            alert("Network error");
        }
    }
    
    async function checkPaymentStatus(invoiceId) {
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        loading.innerText = '⏳ في انتظار تأكيد الدفع...';
        for (let i = 0; i < 60; i++) {
            await new Promise(r => setTimeout(r, 5000));
            try {
                const res = await fetch(`${SERVER_URL}/check-invoice/${invoiceId}`);
                const data = await res.json();
                if (data.status === 'paid') {
                    loading.style.display = 'none';
                    alert('✅ تم تأكيد الدفع!');
                    fetchPixels();
                    return;
                }
            } catch(e) {}
        }
        loading.style.display = 'none';
        alert("Payment not confirmed within 5 minutes");
    }
    
    function closeModal() {
        document.getElementById('purchase-modal').style.display = 'none';
        document.getElementById('owner-name').value = '';
        document.getElementById('owner-url').value = '';
    }
    
    // ===================== لوحة الألوان =====================
    function buildColorPalette() {
        const palette = document.getElementById('color-palette');
        palette.innerHTML = '';
        colorsList.forEach(color => {
            const div = document.createElement('div');
            div.className = 'color';
            div.style.backgroundColor = color;
            div.onclick = () => {
                document.querySelectorAll('.color').forEach(c => c.classList.remove('active'));
                div.classList.add('active');
                currentColor = color;
            };
            palette.appendChild(div);
        });
        document.querySelector('.color').classList.add('active');
    }
    
    // ===================== تبديل اللغة =====================
    function toggleLanguage() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        const t = translations[currentLang];
        document.getElementById('modal-title').innerText = t.title;
        document.getElementById('modal-desc').innerText = t.desc;
        document.getElementById('confirm-purchase').innerText = t.confirm;
        document.getElementById('cancel-btn').innerText = t.cancel;
        document.getElementById('lang-btn').innerText = t.langBtn;
    }
    
    // ===================== التكبير والتحريك =====================
    container.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        scale = Math.min(20, Math.max(2, scale + delta));
        resizeCanvas();
    });
    
    // ===================== بدء التشغيل =====================
    document.getElementById('confirm-purchase').onclick = () => {
        const owner = document.getElementById('owner-name').value.trim();
        const url = document.getElementById('owner-url').value.trim();
        if (!owner || !url) { alert('❌ الرجاء إدخال اسمك ورابط حسابك'); return; }
        createInvoice(owner, url);
    };
    
    buildColorPalette();
    resizeCanvas();
    connectWebSocket();
    fetchPixels();
</script>
</body>
</html>
