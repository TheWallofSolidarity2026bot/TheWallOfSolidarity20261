<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>جدار الإعلانات - مليون بكسل إعلاني</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: linear-gradient(135deg, #0a2e0a 0%, #1a1a2e 100%); min-height: 100vh; font-family: 'Tajawal', 'Cairo', sans-serif; color: #fff; overflow: hidden; }
        
        .controls { position: fixed; top: 10px; left: 10px; right: 10px; z-index: 2000; display: flex; flex-wrap: wrap; gap: 8px; justify-content: space-between; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 30px; backdrop-filter: blur(5px); }
        .stats { display: flex; gap: 15px; }
        .stat { font-size: 12px; }
        .stat span { color: #e74c3c; font-weight: bold; }
        
        .zoom-controls { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .zoom-btn { width: 45px; height: 45px; border-radius: 50%; background: rgba(0,0,0,0.8); border: 2px solid #e74c3c; color: #e74c3c; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .zoom-level { font-size: 12px; text-align: center; margin-top: 5px; color: #e74c3c; }
        
        .canvas-container { width: 100vw; height: 100vh; overflow: auto; cursor: crosshair; background: #111; }
        #canvas { display: block; background: #2d2d2d; cursor: crosshair; }
        
        /* واجهة تحديد المساحة */
        .selection-overlay { position: fixed; border: 2px dashed #e74c3c; background: rgba(231,76,60,0.3); pointer-events: none; z-index: 1500; display: none; }
        .selection-info { position: fixed; background: rgba(0,0,0,0.8); color: #fff; padding: 5px 10px; border-radius: 10px; font-size: 12px; z-index: 1500; display: none; }
        
        .purchase-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { background: #1a2e1a; padding: 20px; border-radius: 20px; border: 2px solid #e74c3c; width: 90%; max-width: 400px; text-align: center; }
        .modal-content input, .modal-content file { width: 100%; padding: 8px; margin: 8px 0; background: #0f1a0f; border: 1px solid #e74c3c; border-radius: 8px; color: #fff; }
        .modal-content button { background: #e74c3c; color: #fff; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 8px; }
        
        .loading { position: fixed; bottom: 20px; right: 20px; background: #e74c3c; padding: 6px 12px; border-radius: 20px; font-size: 11px; display: none; z-index: 2100; }
        
        @media (max-width: 768px) { .controls { font-size: 10px; } .zoom-btn { width: 40px; height: 40px; } }
    </style>
</head>
<body>

<div class="controls">
    <div class="stats">
        <div class="stat">📊 المساحة المباعة: <span id="area-count">0</span></div>
        <div class="stat">💰 السعر: 1$ / بكسل</div>
    </div>
    <div class="stat">🖱️ اسحب لتحديد مساحة إعلانية</div>
</div>

<div class="zoom-controls">
    <div class="zoom-btn" id="zoom-in">+</div>
    <div class="zoom-btn" id="zoom-out">-</div>
    <div class="zoom-btn" id="zoom-reset" style="font-size: 16px;">⟳</div>
    <div class="zoom-level" id="zoom-level">100%</div>
</div>

<div class="canvas-container" id="canvas-container">
    <canvas id="canvas"></canvas>
</div>

<div class="selection-overlay" id="selection-overlay"></div>
<div class="selection-info" id="selection-info">0x0 (0 بكسل = 0$)</div>

<div class="loading" id="loading">⏳ جاري المعالجة...</div>

<div id="purchase-modal" class="purchase-modal">
    <div class="modal-content">
        <div style="font-size: 40px;">🇵🇸</div>
        <h3>اشتر هذه المساحة الإعلانية</h3>
        <p id="modal-size">المساحة: 0x0 (0 بكسل)</p>
        <p id="modal-price">السعر: 0$</p>
        <input type="text" id="owner-name" placeholder="اسمك أو معرفك">
        <input type="url" id="owner-url" placeholder="الرابط (موقعك أو حسابك)">
        <input type="file" id="owner-image" accept="image/png,image/jpeg,image/jpg">
        <button id="confirm-purchase">✅ تأكيد الشراء</button>
        <button onclick="closeModal()" id="cancel-btn">❌ إلغاء</button>
    </div>
</div>

<script>
    const SERVER_URL = "https://your-railway-app.up.railway.app";
    const CANVAS_SIZE = 1000;
    let scale = 4;
    let minZoom = 2, maxZoom = 20;
    let ctx, canvas, container;
    let soldAreas = [];
    
    // متغيرات تحديد المساحة
    let isSelecting = false;
    let startX = 0, startY = 0;
    let endX = 0, endY = 0;
    let selectedArea = null;
    
    // ===================== إعدادات اللوحة =====================
    canvas = document.getElementById('canvas');
    container = document.getElementById('canvas-container');
    ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
        canvas.width = CANVAS_SIZE * scale;
        canvas.height = CANVAS_SIZE * scale;
        canvas.style.width = `${CANVAS_SIZE * scale}px`;
        canvas.style.height = `${CANVAS_SIZE * scale}px`;
        drawAllAreas();
        const zoomPercent = Math.round((scale / 4) * 100);
        document.getElementById('zoom-level').innerText = `${zoomPercent}%`;
    }
    
    function drawAllAreas() {
        ctx.fillStyle = "#2d2d2d";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        for (const area of soldAreas) {
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, area.x * scale, area.y * scale, area.width * scale, area.height * scale);
            };
            img.src = area.image_url;
        }
    }
    
    function drawSelection() {
        if (!isSelecting) return;
        const rectX = Math.min(startX, endX);
        const rectY = Math.min(startY, endY);
        const rectW = Math.abs(endX - startX);
        const rectH = Math.abs(endY - startY);
        
        // رسم المستطيل المؤقت
        ctx.fillStyle = "rgba(231,76,60,0.3)";
        ctx.fillRect(rectX * scale, rectY * scale, rectW * scale, rectH * scale);
        ctx.strokeStyle = "#e74c3c";
        ctx.lineWidth = 2;
        ctx.strokeRect(rectX * scale, rectY * scale, rectW * scale, rectH * scale);
        
        // تحديث معلومات المساحة
        const pixels = rectW * rectH;
        const price = pixels * 1;
        document.getElementById('selection-info').style.display = 'block';
        document.getElementById('selection-info').innerHTML = `${rectW}x${rectH} (${pixels} بكسل = ${price}$)`;
        document.getElementById('selection-info').style.left = (endX * scale + 20) + 'px';
        document.getElementById('selection-info').style.top = (endY * scale - 30) + 'px';
    }
    
    // ===================== أحداث الماوس =====================
    function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const canvasX = (clientX - rect.left) * (canvas.width / rect.width);
        const canvasY = (clientY - rect.top) * (canvas.height / rect.height);
        return { x: Math.floor(canvasX / scale), y: Math.floor(canvasY / scale) };
    }
    
    function onMouseDown(e) {
        e.preventDefault();
        const { x, y } = getCanvasCoords(e);
        startX = x;
        startY = y;
        endX = x;
        endY = y;
        isSelecting = true;
    }
    
    function onMouseMove(e) {
        if (!isSelecting) return;
        e.preventDefault();
        const { x, y } = getCanvasCoords(e);
        endX = Math.min(CANVAS_SIZE - 1, Math.max(0, x));
        endY = Math.min(CANVAS_SIZE - 1, Math.max(0, y));
        
        drawAllAreas();
        drawSelection();
    }
    
    function onMouseUp(e) {
        if (!isSelecting) return;
        isSelecting = false;
        
        const rectX = Math.min(startX, endX);
        const rectY = Math.min(startY, endY);
        const rectW = Math.abs(endX - startX) + 1;
        const rectH = Math.abs(endY - startY) + 1;
        
        if (rectW > 0 && rectH > 0) {
            // التحقق من أن المساحة غير مباعة
            let overlap = false;
            for (const area of soldAreas) {
                if (!(rectX + rectW <= area.x || area.x + area.width <= rectX ||
                      rectY + rectH <= area.y || area.y + area.height <= rectY)) {
                    overlap = true;
                    break;
                }
            }
            if (overlap) {
                alert("❌ هذه المساحة متداخلة مع إعلان مباع! اختر مساحة أخرى.");
            } else {
                selectedArea = { x: rectX, y: rectY, width: rectW, height: rectH, pixels: rectW * rectH, price: rectW * rectH };
                document.getElementById('modal-size').innerHTML = `المساحة: ${rectW}x${rectH} (${rectW * rectH} بكسل)`;
                document.getElementById('modal-price').innerHTML = `السعر: ${rectW * rectH}$`;
                document.getElementById('purchase-modal').style.display = 'flex';
            }
        }
        
        drawAllAreas();
        document.getElementById('selection-info').style.display = 'none';
    }
    
    canvas.addEventListener('mousedown', onMouseDown);
    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('mouseup', onMouseUp);
    canvas.addEventListener('touchstart', onMouseDown);
    canvas.addEventListener('touchmove', onMouseMove);
    canvas.addEventListener('touchend', onMouseUp);
    
    // ===================== التكبير والتصغير =====================
    function zoomIn() { let newZoom = scale + 1; if (newZoom <= maxZoom) { scale = newZoom; resizeCanvas(); } }
    function zoomOut() { let newZoom = scale - 1; if (newZoom >= minZoom) { scale = newZoom; resizeCanvas(); } }
    function zoomReset() { scale = 4; resizeCanvas(); container.scrollTop = (container.scrollHeight - container.clientHeight) / 2; container.scrollLeft = (container.scrollWidth - container.clientWidth) / 2; }
    
    document.getElementById('zoom-in').addEventListener('click', zoomIn);
    document.getElementById('zoom-out').addEventListener('click', zoomOut);
    document.getElementById('zoom-reset').addEventListener('click', zoomReset);
    
    // ===================== جلب المناطق المباعة =====================
    async function fetchAreas() {
        try {
            const res = await fetch(`${SERVER_URL}/areas`);
            const data = await res.json();
            soldAreas = data.areas || [];
            document.getElementById('area-count').innerText = soldAreas.length;
            drawAllAreas();
        } catch(e) { console.error(e); }
    }
    
    // ===================== الشراء =====================
    async function createInvoice() {
        const owner = document.getElementById('owner-name').value.trim();
        const linkUrl = document.getElementById('owner-url').value.trim();
        const imageFile = document.getElementById('owner-image').files[0];
        
        if (!owner || !linkUrl || !imageFile) {
            alert("❌ الرجاء إدخال جميع البيانات (الاسم، الرابط، الصورة)");
            return;
        }
        
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        
        const formData = new FormData();
        formData.append('x', selectedArea.x);
        formData.append('y', selectedArea.y);
        formData.append('width', selectedArea.width);
        formData.append('height', selectedArea.height);
        formData.append('link_url', linkUrl);
        formData.append('owner', owner);
        formData.append('image', imageFile);
        
        try {
            const res = await fetch(`${SERVER_URL}/create-invoice`, {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            if (data.pay_url) {
                loading.style.display = 'none';
                closeModal();
                window.open(data.pay_url, '_blank');
                checkPaymentStatus(data.invoice_id);
            } else {
                loading.style.display = 'none';
                alert("Error creating invoice");
            }
        } catch(e) {
            loading.style.display = 'none';
            alert("Network error");
        }
    }
    
    async function checkPaymentStatus(invoiceId) {
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        loading.innerText = '⏳ في انتظار تأكيد الدفع...';
        for (let i = 0; i < 60; i++) {
            await new Promise(r => setTimeout(r, 5000));
            try {
                const res = await fetch(`${SERVER_URL}/check-invoice/${invoiceId}`);
                const data = await res.json();
                if (data.status === 'paid') {
                    loading.style.display = 'none';
                    alert('✅ تم تأكيد الدفع! سيظهر إعلانك على الجدار.');
                    fetchAreas();
                    return;
                }
            } catch(e) {}
        }
        loading.style.display = 'none';
        alert("Payment not confirmed within 5 minutes");
    }
    
    function closeModal() {
        document.getElementById('purchase-modal').style.display = 'none';
        document.getElementById('owner-name').value = '';
        document.getElementById('owner-url').value = '';
        document.getElementById('owner-image').value = '';
        selectedArea = null;
    }
    
    document.getElementById('confirm-purchase').onclick = createInvoice;
    
    // ===================== التشغيل =====================
    resizeCanvas();
    fetchAreas();
</script>
</body>
</html>
