<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جدار التضامن 2026 - النسخة التجريبية المجانية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: linear-gradient(135deg, #0a2e0a 0%, #1a1a2e 100%); min-height: 100vh; font-family: 'Tajawal', 'Cairo', sans-serif; color: #fff; overflow: hidden; }
        
        .badge { position: fixed; top: 60px; left: 15px; background: #27ae60; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; z-index: 2100; }
        .canvas-container { width: 100vw; height: 100vh; overflow: auto; cursor: crosshair; background: #111; margin-top: 50px; -webkit-overflow-scrolling: touch; }
        
        canvas {
            display: block;
            background: #2d2d2d;
            cursor: crosshair;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            -ms-interpolation-mode: nearest-neighbor;
        }
        
        .top-bar { position: fixed; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.85); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; z-index: 2000; backdrop-filter: blur(5px); }
        .lang-btn { background: #e74c3c; border: none; padding: 5px 15px; border-radius: 20px; color: #fff; cursor: pointer; font-weight: bold; }
        .stats { display: flex; gap: 15px; font-size: 12px; }
        .stats span { color: #e74c3c; font-weight: bold; }
        
        .zoom-buttons { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        .zoom-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.8); border: 2px solid #e74c3c; color: #e74c3c; font-size: 24px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .zoom-btn:hover { background: #e74c3c; color: #fff; }
        .zoom-level { font-size: 11px; text-align: center; margin-top: 5px; color: #e74c3c; background: rgba(0,0,0,0.6); padding: 4px 6px; border-radius: 15px; }
        
        .selection-info { position: fixed; background: rgba(0,0,0,0.85); color: #e74c3c; padding: 8px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; z-index: 1500; display: none; pointer-events: none; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { background: #1a2e1a; padding: 25px; border-radius: 20px; border: 2px solid #e74c3c; width: 90%; max-width: 400px; text-align: center; }
        .modal-content h3 { color: #e74c3c; margin-bottom: 15px; }
        .modal-content input { width: 100%; padding: 10px; margin: 8px 0; background: #0f1a0f; border: 1px solid #e74c3c; border-radius: 8px; color: #fff; }
        .modal-content input[type="file"] { padding: 5px; }
        .modal-content button { background: #27ae60; color: #fff; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 8px; font-weight: bold; }
        .cancel-btn { background: #555 !important; }
        
        .loading { position: fixed; bottom: 20px; right: 20px; background: #27ae60; padding: 8px 15px; border-radius: 20px; font-size: 12px; display: none; z-index: 2100; }
        .welcome { text-align: center; padding: 5px; font-size: 11px; background: rgba(0,0,0,0.5); position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000; }
        
        @media (max-width: 768px) { .top-bar { font-size: 10px; } .stats { gap: 8px; } .zoom-btn { width: 35px; height: 35px; font-size: 20px; } }
    </style>
</head>
<body>

<div class="badge">🎁 النسخة المجانية | تجريبية | لا دفع</div>

<div class="top-bar">
    <button class="lang-btn" id="langBtn">English</button>
    <div class="stats">
        <div class="stat">📊 <span id="areaCount">0</span> <span id="statSold">إعلان</span></div>
        <div class="stat">💰 <span id="statFree">مجاني</span></div>
    </div>
    <div class="stat" id="instructionText">🖱️ اسحب لتحديد مساحة إعلانية</div>
</div>

<div class="zoom-buttons">
    <div class="zoom-btn" id="zoomIn">+</div>
    <div class="zoom-btn" id="zoomOut">-</div>
    <div class="zoom-btn" id="zoomReset">⟳</div>
    <div class="zoom-level" id="zoomLevel">100%</div>
</div>

<div class="canvas-container" id="canvasContainer">
    <canvas id="canvas"></canvas>
</div>

<div class="selection-info" id="selectionInfo">0x0 (0 بكسل)</div>
<div class="loading" id="loading">⏳ جاري الحفظ...</div>
<div class="welcome" id="welcomeText">🇵🇸 النسخة المجانية - جدار التضامن 2026 🇵🇸</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div style="font-size: 40px;">🇵🇸</div>
        <h3 id="modalTitle">أضف إعلانك</h3>
        <p id="modalSize">المساحة: 0x0 (0 بكسل)</p>
        <input type="text" id="ownerName" placeholder="اسمك أو معرفك">
        <input type="url" id="ownerUrl" placeholder="الرابط (موقعك أو حسابك)">
        <input type="file" id="ownerImage" accept="image/png,image/jpeg,image/jpg">
        <button id="confirmBtn">✅ حفظ الإعلان (مجاني)</button>
        <button class="cancel-btn" id="cancelBtn">❌ إلغاء</button>
    </div>
</div>

<script>
    // ✅ النسخة المجانية - تعمل محلياً (LocalStorage) بدون سيرفر
    const CANVAS_SIZE = 400;
    let scale = 4;
    let minZoom = 2, maxZoom = 20;
    let ctx, canvas, container;
    let soldAreas = [];
    let currentLang = 'ar';
    let nextId = 1;
    
    let isSelecting = false;
    let startX = 0, startY = 0;
    let endX = 0, endY = 0;
    let selectedArea = null;
    
    const texts = {
        ar: { langBtn: "English", statSold: "إعلان", statFree: "مجاني",
            instruction: "🖱️ اسحب لتحديد مساحة إعلانية", welcome: "🇵🇸 النسخة المجانية - جدار التضامن 2026 🇵🇸",
            modalTitle: "أضف إعلانك", confirm: "✅ حفظ الإعلان (مجاني)", cancel: "❌ إلغاء",
            fillError: "❌ الرجاء إدخال جميع البيانات", areaError: "❌ هذه المساحة متداخلة مع إعلان موجود!",
            saveSuccess: "✅ تم حفظ إعلانك بنجاح!"
        },
        en: { langBtn: "العربية", statSold: "Ads", statFree: "Free",
            instruction: "🖱️ Drag to select an advertising area", welcome: "🇵🇸 Free Version - The Wall of Solidarity 2026 🇵🇸",
            modalTitle: "Add Your Ad", confirm: "✅ Save Ad (Free)", cancel: "❌ Cancel",
            fillError: "❌ Please fill all fields", areaError: "❌ This area overlaps with an existing ad!",
            saveSuccess: "✅ Your ad has been saved successfully!"
        }
    };
    
    function updateLanguage() {
        const t = texts[currentLang];
        document.getElementById('langBtn').innerText = t.langBtn;
        document.getElementById('statSold').innerText = t.statSold;
        document.getElementById('statFree').innerText = t.statFree;
        document.getElementById('instructionText').innerText = t.instruction;
        document.getElementById('welcomeText').innerHTML = t.welcome;
        document.getElementById('modalTitle').innerText = t.modalTitle;
        document.getElementById('confirmBtn').innerHTML = t.confirm;
        document.getElementById('cancelBtn').innerHTML = t.cancel;
    }
    
    function toggleLanguage() { currentLang = currentLang === 'ar' ? 'en' : 'ar'; updateLanguage(); }
    
    canvas = document.getElementById('canvas');
    container = document.getElementById('canvasContainer');
    ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
        canvas.width = CANVAS_SIZE * scale;
        canvas.height = CANVAS_SIZE * scale;
        canvas.style.width = `${CANVAS_SIZE * scale}px`;
        canvas.style.height = `${CANVAS_SIZE * scale}px`;
        drawAllAreas();
        document.getElementById('zoomLevel').innerHTML = `${Math.round((scale/4)*100)}%`;
    }
    
    function drawAllAreas() {
        ctx.fillStyle = "#2d2d2d";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (const area of soldAreas) {
            const img = new Image();
            img.onload = () => ctx.drawImage(img, area.x * scale, area.y * scale, area.width * scale, area.height * scale);
            img.src = area.image_url;
        }
    }
    
    function saveToLocalStorage() {
        localStorage.setItem('solidarity_wall_free', JSON.stringify({ areas: soldAreas, nextId: nextId }));
    }
    
    function loadFromLocalStorage() {
        const saved = localStorage.getItem('solidarity_wall_free');
        if (saved) {
            const data = JSON.parse(saved);
            soldAreas = data.areas || [];
            nextId = data.nextId || soldAreas.length + 1;
            document.getElementById('areaCount').innerText = soldAreas.length;
            drawAllAreas();
        }
    }
    
    function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const canvasX = (clientX - rect.left) * (canvas.width / rect.width);
        const canvasY = (clientY - rect.top) * (canvas.height / rect.height);
        return { x: Math.floor(canvasX / scale), y: Math.floor(canvasY / scale) };
    }
    
    function drawSelection() {
        const rectX = Math.min(startX, endX), rectY = Math.min(startY, endY);
        const rectW = Math.abs(endX - startX) + 1, rectH = Math.abs(endY - startY) + 1;
        ctx.fillStyle = "rgba(231,76,60,0.3)";
        ctx.fillRect(rectX * scale, rectY * scale, rectW * scale, rectH * scale);
        ctx.strokeStyle = "#e74c3c";
        ctx.strokeRect(rectX * scale, rectY * scale, rectW * scale, rectH * scale);
        const info = document.getElementById('selectionInfo');
        info.style.display = 'block';
        info.innerHTML = `${rectW}x${rectH} (${rectW*rectH} بكسل)`;
        info.style.left = (endX * scale + 20) + 'px';
        info.style.top = (endY * scale - 30) + 'px';
    }
    
    function onMouseDown(e) { e.preventDefault(); const { x, y } = getCanvasCoords(e); startX = x; startY = y; endX = x; endY = y; isSelecting = true; }
    function onMouseMove(e) { if (!isSelecting) return; e.preventDefault(); const { x, y } = getCanvasCoords(e); endX = Math.min(CANVAS_SIZE-1, Math.max(0, x)); endY = Math.min(CANVAS_SIZE-1, Math.max(0, y)); drawAllAreas(); drawSelection(); }
    function onMouseUp(e) {
        if (!isSelecting) return;
        isSelecting = false;
        const rectX = Math.min(startX, endX), rectY = Math.min(startY, endY);
        const rectW = Math.abs(endX - startX) + 1, rectH = Math.abs(endY - startY) + 1;
        if (rectW > 0 && rectH > 0) {
            let overlap = false;
            for (const area of soldAreas) {
                if (!(rectX + rectW <= area.x || area.x + area.width <= rectX || rectY + rectH <= area.y || area.y + area.height <= rectY)) {
                    overlap = true; break;
                }
            }
            if (overlap) alert(texts[currentLang].areaError);
            else { selectedArea = { x: rectX, y: rectY, width: rectW, height: rectH };
                document.getElementById('modalSize').innerHTML = `المساحة: ${rectW}x${rectH} (${rectW*rectH} بكسل)`;
                document.getElementById('modal').style.display = 'flex';
            }
        }
        drawAllAreas();
        document.getElementById('selectionInfo').style.display = 'none';
    }
    
    canvas.addEventListener('mousedown', onMouseDown);
    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('mouseup', onMouseUp);
    canvas.addEventListener('touchstart', onMouseDown);
    canvas.addEventListener('touchmove', onMouseMove);
    canvas.addEventListener('touchend', onMouseUp);
    
    document.getElementById('zoomIn').onclick = () => { let n = scale + 1; if (n <= maxZoom) { scale = n; resizeCanvas(); } };
    document.getElementById('zoomOut').onclick = () => { let n = scale - 1; if (n >= minZoom) { scale = n; resizeCanvas(); } };
    document.getElementById('zoomReset').onclick = () => { scale = 4; resizeCanvas(); container.scrollTop = (container.scrollHeight - container.clientHeight) / 2; container.scrollLeft = (container.scrollWidth - container.clientWidth) / 2; };
    
    function saveAd() {
        const t = texts[currentLang];
        const owner = document.getElementById('ownerName').value.trim();
        const linkUrl = document.getElementById('ownerUrl').value.trim();
        const imageFile = document.getElementById('ownerImage').files[0];
        if (!owner || !linkUrl || !imageFile) { alert(t.fillError); return; }
        const loading = document.getElementById('loading');
        loading.style.display = 'block';
        const reader = new FileReader();
        reader.onload = function(e) {
            const newArea = { id: nextId++, x: selectedArea.x, y: selectedArea.y, width: selectedArea.width, height: selectedArea.height, image_url: e.target.result, link_url: linkUrl, owner: owner };
            soldAreas.push(newArea);
            saveToLocalStorage();
            document.getElementById('areaCount').innerText = soldAreas.length;
            drawAllAreas();
            loading.style.display = 'none';
            closeModal();
            alert(t.saveSuccess);
        };
        reader.readAsDataURL(imageFile);
    }
    
    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('ownerName').value = '';
        document.getElementById('ownerUrl').value = '';
        document.getElementById('ownerImage').value = '';
        selectedArea = null;
    }
    
    document.getElementById('confirmBtn').onclick = saveAd;
    document.getElementById('cancelBtn').onclick = closeModal;
    document.getElementById('langBtn').onclick = toggleLanguage;
    
    canvas.addEventListener('click', (e) => {
        const { x, y } = getCanvasCoords(e);
        for (const area of soldAreas) {
            if (x >= area.x && x < area.x + area.width && y >= area.y && y < area.y + area.height) {
                window.open(area.link_url, '_blank'); break;
            }
        }
    });
    
    updateLanguage();
    resizeCanvas();
    loadFromLocalStorage();
</script>
</body>
</html>
